workflows:
  ios-skinproof:
    name: SkinProof iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: SkinProof ASC Key

    environment:
      groups:
        # Must contain CERTIFICATE_PRIVATE_KEY (a PEM RSA private key, marked
        # Secure) — used to create/sign the iOS distribution certificate, which
        # Apple's API cannot create without a private key.
        - appstore_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6783539670
      node: 20
      xcode: 26.2
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: 安裝 npm 套件
        script: npm ci
      - name: 同步前端到 iOS 原生專案
        script: |
          npx cap sync ios
      - name: 安裝 CocoaPods
        script: |
          cd ios/App && pod install
      - name: 取得/建立簽章檔並套用
        script: |
          set -e
          keychain initialize
          # Create (if missing) + fetch the distribution certificate AND the App
          # Store provisioning profile for the bundle id, then apply to Xcode.
          # --certificate-key supplies the private key Apple's API requires to
          # create/sign the distribution certificate (stored as a secure env var).
          app-store-connect fetch-signing-files "app.skinproof.ios" \
            --type IOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 設定 build number（用 Codemagic 遞增的 BUILD_NUMBER，保證每次都更高）
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          # The app isn't on the App Store yet, so get-latest-app-store-build-number
          # returned 0 and produced a duplicate build number (1). Codemagic's
          # BUILD_NUMBER is monotonic per build, so it's always higher than any
          # previously uploaded build.
          agvtool new-version -all "$BUILD_NUMBER"
      - name: 打包 IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
