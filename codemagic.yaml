workflows:
  ios-skinproof:
    name: SkinProof iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: SkinProof ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.skinproof.ios
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6783539670
      node: 20
      xcode: 26.2
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: 安裝 npm 套件
        script: npm ci
      - name: 同步前端到 iOS 原生專案
        script: |
          npx cap sync ios
      - name: 安裝 CocoaPods
        script: |
          cd ios/App && pod install
      - name: 套用簽章描述檔
        script: xcode-project use-profiles
      - name: 自動遞增 build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST + 1))
      - name: 打包 IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
